name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type:
    name: Lint + type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install the package + dev tools
        run: |
          uv pip install --system -e ".[dev]"

      - name: Ruff check
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      - name: mypy strict
        run: mypy src/lexvault

  test:
    name: Test (py${{ matrix.python }} · litellm${{ matrix.litellm }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
        litellm: ["==1.80.15", ">=1.80.15"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: |
          uv pip install --system "litellm${{ matrix.litellm }}"
          uv pip install --system -e . pytest pytest-asyncio

      - name: Run tests
        run: pytest -v

  integration:
    name: Integration tests (latest litellm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies (latest litellm)
        run: |
          uv pip install --system "litellm>=1.80.15"
          uv pip install --system -e . pytest pytest-asyncio

      - name: Run integration tests
        run: pytest tests/integration -v

  coverage:
    name: Coverage (≥90% core)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: |
          uv pip install --system "litellm>=1.80.15"
          uv pip install --system -e ".[dev]" pytest pytest-asyncio

      # CS-A1: enforce ≥90% coverage on the core masking modules (the MVP's
      # correctness core: engine, vault, detector, streaming). Adapters/guardrail
      # are covered by round-trip + integration tests but include best-effort
      # defensive branches; overall coverage is reported but not gated.
      - name: Run tests with coverage gate
        run: |
          pytest tests/ -q \
            --cov=lexvault.engine \
            --cov=lexvault.vault \
            --cov=lexvault.detector \
            --cov=lexvault.streaming.buffer \
            --cov=lexvault.streaming.restore \
            --cov-fail-under=90 \
            --cov-report=term-missing

  proxy-smoke:
    name: End-to-end proxy smoke (boots litellm --config)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: |
          uv pip install --system "litellm[proxy]>=1.80.15"
          uv pip install --system -e .

      # CS-D3: boot the real LiteLLM proxy with the lexvault guardrail and curl
      # a chat completion. A malformed guardrail config block crashes litellm at
      # startup (CS-D1), so a clean boot + round-trip retroactively validates the
      # documented quickstart. mock_response can't catch a config-shape error.
      - name: Boot litellm --config and run smoke curl
        run: bash examples/ci_smoke.sh
