# lexvault + LiteLLM 60-second quickstart.
#
#   docker compose -f examples/docker-compose.yml up --build
#   curl http://localhost:4000/v1/chat/completions \
#     -H "Content-Type: application/json" \
#     -d '{"model":"fake","messages":[{"role":"user","content":"What is Project Titan?"}]}'
#
# The fake backend echoes requests, so you can see that "Project Titan" is
# masked to a placeholder upstream and restored in the response.

services:
  # A tiny fake OpenAI endpoint that echoes the request (so you can observe the
  # masked placeholder reaching the "model"). Dependency-free stdlib echo server
  # (examples/fake_backend.py) — replaces the previously-referenced, non-existent
  # ghcr.io/berriai/fake-openai-endpoint image (CS-D2).
  fake-backend:
    build:
      context: .
      dockerfile: Dockerfile.fake-backend
    ports:
      - "8000:8000"

  litellm:
    # Builds from the REPO ROOT so Dockerfile.litellm can `pip install .`
    # (lexvault is not on PyPI yet — CS-D2).
    build:
      context: ..
      dockerfile: examples/Dockerfile.litellm
    ports:
      - "4000:4000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./lexvault_shim.py:/app/lexvault_shim.py:ro
      - ./dictionary.yaml:/app/dictionary.yaml:ro
    command: --config /app/config.yaml --port 4000 --num_workers 1
    environment:
      # Set a real org key for deterministic placeholders (keep secret).
      # The example config.yaml uses org_key: os.environ/LEXVAULT_ORG_KEY so this
      # is the one place to set it (CS-D5).
      LEXVAULT_ORG_KEY: change-me-to-a-real-secret-key
    depends_on:
      - fake-backend
