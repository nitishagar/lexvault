{% extends "main.html" %}

{% block tabs %}
{{ super() }}

<style>
  /* Home page only: the hero carries the title, so hide the auto-generated
     content heading and the edit/view actions next to it. */
  .md-content .md-typeset h1:first-of-type { display: none; }
  .md-content__button { display: none; }
</style>

<section class="lexvault-hero-section">
  <div class="md-grid md-typeset">
    <div class="lexvault-hero">
      <p class="lexvault-kicker">reversible pseudonymization for LiteLLM</p>
      <h1>lexvault</h1>
      <p class="lexvault-tagline">
        Mask your codenames, products, customers, and schema on the way out —
        restore them faithfully on the way back.
      </p>
      <div class="lexvault-install">
        <code><span class="lexvault-prompt">$</span> pip install lexvault</code>
        <button class="lexvault-copy" title="Copy to clipboard"
                onclick="navigator.clipboard.writeText('pip install lexvault');this.textContent='copied';setTimeout(()=>this.textContent='copy',1200)">copy</button>
      </div>
      <div class="lexvault-cta">
        <a href="{{ 'quickstart/' | url }}" class="md-button md-button--primary">Get started</a>
        <a href="{{ config.repo_url }}" class="md-button">GitHub</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
